<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TechQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white">
    
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="/" class="flex items-center space-x-3">
                    <div class="bg-indigo-600 p-2 rounded-lg text-white font-bold text-xl tracking-wider">
                        TQ
                    </div>
                    <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">TechQuiz</span>
                </a>
            </div>
            <span class="text-xs bg-slate-800 px-3 py-1.5 rounded-full text-slate-400 font-medium">Secure Admin Area</span>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-16 w-full flex-grow flex flex-col justify-center">
        <div class="bg-slate-800/40 border border-slate-700/60 rounded-3xl p-8 md:p-10 shadow-2xl shadow-slate-950/40 relative overflow-hidden">
            <div class="absolute -top-12 -left-12 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
            <div class="absolute -bottom-12 -right-12 w-48 h-48 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>

            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-200 bg-clip-text text-transparent">
                    Admin Sign In
                </h1>
                <p class="text-sm text-slate-400 mt-2">Enter credentials to manage quiz questions</p>
            </div>

            {% if error %}
            <div class="mb-6 p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm font-medium">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/admin/login" class="space-y-6">
                <input type="hidden" name="entry_key" value="{{ entry_key }}">

                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-300 mb-2">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="off"
                           class="w-full px-4 py-3 rounded-xl border border-slate-700 bg-slate-900/60 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200">
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 rounded-xl border border-slate-700 bg-slate-900/60 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all duration-200">
                </div>

                <button type="submit"
                        class="w-full py-4 rounded-xl bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-semibold shadow-lg shadow-indigo-600/20 transition-all duration-200 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-900">
                    Sign In
                </button>
            </form>
        </div>
    </main>

    <footer class="border-t border-slate-800 py-6 text-center text-slate-500 text-sm">
        <p>&copy; 2026 TechQuiz. Secure portal.</p>
    </footer>

</body>
</html>
