<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tech Quiz</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white">
    
    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white font-bold text-xl tracking-wider">
                    TQ
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">TechQuiz</span>
            </div>
            <span class="text-xs bg-slate-800 px-3 py-1.5 rounded-full text-slate-400 font-medium">Privacy Protected</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 py-12 w-full flex-grow">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight sm:text-5xl bg-gradient-to-r from-white via-slate-100 to-indigo-200 bg-clip-text text-transparent">
                Test Your Knowledge
            </h1>
            <p class="mt-3 text-slate-400 text-lg">
                Answer the 5 multiple choice questions below. Good luck!
            </p>
        </div>

        <form action="/submit" method="POST" class="space-y-8">
            {% for quiz in quizzes %}
            <div class="bg-slate-800/50 border border-slate-700/60 rounded-2xl p-6 md:p-8 hover:border-indigo-500/50 transition-all duration-300 shadow-xl shadow-slate-950/20 group">
                <div class="flex items-start space-x-4">
                    <span class="flex-shrink-0 flex items-center justify-center w-8 h-8 rounded-lg bg-indigo-500/10 text-indigo-400 font-bold border border-indigo-500/20">
                        {{ loop.index }}
                    </span>
                    <h2 class="text-lg md:text-xl font-semibold text-slate-100 mt-0.5">
                        {{ quiz.question }}
                    </h2>
                </div>
                
                <!-- Options Grid -->
                <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                    {% for option in quiz.options %}
                    <label class="relative flex items-center p-4 rounded-xl border border-slate-700 bg-slate-900/40 hover:bg-slate-800/80 hover:border-slate-600 cursor-pointer transition-all duration-200 group-hover:border-slate-700/80 select-none">
                        <input type="radio" name="q_{{ quiz.id }}" value="{{ option }}" required
                               class="w-4 h-4 text-indigo-600 bg-slate-950 border-slate-700 focus:ring-indigo-500 focus:ring-offset-slate-900 focus:ring-2 focus:ring-offset-2">
                        <span class="ml-3 text-slate-300 font-medium text-sm md:text-base">{{ option }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}

            <!-- Submit Button -->
            <div class="pt-4 flex justify-center">
                <button type="submit" class="w-full sm:w-auto px-8 py-4 rounded-xl bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-semibold text-lg shadow-lg shadow-indigo-600/20 transition-all duration-200 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-900">
                    Submit Quiz
                </button>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 py-6 text-center text-slate-500 text-sm">
        <p>&copy; 2026 TechQuiz. Zero tracking. Zero cookies. Pure trivia.</p>
    </footer>

</body>
</html>
